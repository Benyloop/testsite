<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .cart-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .cart-image {
            flex: 1;
        }

        .cart-image img {
            width: 100%;
            max-width: 350px;
        }

        .cart-details {
            flex: 1;
        }

        .checkout-btn {
            display: inline-block;
            padding: 12px 20px;
            background: #000;
            color: #fff;
            text-decoration: none;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .cart-container {
                flex-direction: column;
            }
        }
    </style>

</head>
<body>
<a href="index.html" style="text-decoration:none; color:#0066cc;">
    ← Back to Home
</a>

<br><br>
<div class="cart-container">

    <div class="cart-image">
        <img src="shoe.jpg" alt="Demo Running Shoes">
    </div>

    <div class="cart-details">

        <h1>Your Cart</h1>

        <h2>Demo Running Shoes</h2>

        <p>
            Lightweight performance footwear designed for everyday comfort.
        </p>

        <p>
            Quantity: 1
        </p>

        <p>
            Price: €99.00
        </p>

        <hr>

        <h3>Order Summary</h3>

        <p>Subtotal: €99.00</p>
        <p>Shipping: Free</p>

        <h2>Total: €99.00</h2>

        
<a class="checkout-btn" href="checkout.html">
    Proceed to Checkout
</a>

    </div>

</div>

</body>
</html>
